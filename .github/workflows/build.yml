name: Build adblock rules

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -v

      - name: Build rule provider
        run: python -m adblock_merge.builder

      - name: Commit generated rules
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "kamisu"
          git config user.email "152141084+paulgeorge66@users.noreply.github.com"
          git add dist/reject.list dist/build-report.json
          if git diff --cached --quiet; then
            echo "No generated rule changes."
          else
            git commit -m "chore: update generated adblock rules"
            git push
          fi
